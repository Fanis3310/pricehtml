<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Give Price</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #0a84ff);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--secondary-bg-color);
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--hint-color);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            font-family: inherit;
            border-radius: 14px;
            border: 1px solid rgba(150, 150, 150, 0.2);
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
        }

        input::placeholder {
            color: var(--hint-color);
            opacity: 0.8;
            font-weight: 400;
        }

        input:focus {
            border-color: var(--button-color);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 16px 20px;
            background: var(--button-color);
            color: var(--button-text-color);
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(10, 132, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.96);
        }

        button:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(10, 132, 255, 0.4);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-container {
            display: none;
        }

        .success-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .success-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .success-subtitle {
            color: var(--hint-color);
            font-size: 15px;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translateX(-1px);
            }

            20%,
            80% {
                transform: translateX(2px);
            }

            30%,
            50%,
            70% {
                transform: translateX(-4px);
            }

            40%,
            60% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body>
    <!-- Form -->
    <div class="container" id="formContainer">
        <h3>💰 Δώσε Τιμή</h3>
        <p class="subtitle">Γράψε την τιμή για αυτό το σχέδιο</p>
        <div class="input-group">
            <input type="text" id="price" placeholder="π.χ. 25 ή 20-30" inputmode="text" autocomplete="off" />
        </div>
        <button id="submitBtn" onclick="submitPrice()">✅ Αποστολή</button>
    </div>

    <!-- Success -->
    <div class="container success-container" id="successContainer">
        <div class="success-icon">✅</div>
        <div class="success-title">Στάλθηκε!</div>
        <div class="success-subtitle">Η τιμή εστάλη στον πελάτη.</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const resumeUrl = params.get('resume');

        function submitPrice() {
            const priceInput = document.getElementById('price');
            const btn = document.getElementById('submitBtn');
            const price = priceInput.value.trim();

            if (!price) {
                priceInput.classList.add('shake');
                setTimeout(() => priceInput.classList.remove('shake'), 400);
                alert('Παρακαλώ γράψε μια τιμή!');
                return;
            }

            btn.innerHTML = '⏳ Αποστολή...';
            btn.disabled = true;

            if (resumeUrl) {
                // Redirect — λύνει το CORS πρόβλημα
                window.location.href = resumeUrl + '&price=' + encodeURIComponent(price);
            } else {
                showSuccess();
            }
        }

        function showSuccess() {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successContainer').style.display = 'block';
        }

        // Αν επέστρεψε από redirect με success
        if (window.location.search.includes('submitted=true')) {
            showSuccess();
        }
    </script>
</body>

</html>
